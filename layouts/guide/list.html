{{ define "main" }}
<div style="padding: 3rem 0; max-width: 780px;">
  <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">{{ .Title }}</h1>
  <p style="color: var(--color-text-muted); margin-bottom: 2rem;">{{ .Description }}</p>
  <div class="content-body">
    {{ .Content }}
  </div>

  <!-- Bottom CTA -->
  <div style="margin-top: 3rem; padding: 2rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 0.75rem; text-align: center;">
    <h3 style="font-size: 1.1rem; margin-bottom: 0.75rem;">Ready to submit?</h3>
    <p style="color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 1rem;">
      Zip your pack directory and upload it. We'll validate the structure and review for quality.
    </p>
    <a href="https://submit.pax-market.com" class="download-btn" style="text-decoration: none;">Submit a Pack</a>
  </div>
</div>
{{ end }}
