{{ define "main" }}
<section style="padding: 3rem 0 1rem;">
  <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Browse PAX</h1>
  <p style="color: var(--color-text-muted);">{{ len .Pages }} PAX available</p>
</section>

<div class="search-bar">
  <input type="text" class="search-input" id="search-input" placeholder="Search PAX by name, description, domain, or tag...">
  <button class="filter-btn" data-filter="all" onclick="filterByType('all')">All</button>
  <button class="filter-btn" data-filter="paper" onclick="filterByType('paper')">Paper</button>
  <button class="filter-btn" data-filter="topic" onclick="filterByType('topic')">Topic</button>
  <button class="filter-btn" data-filter="field" onclick="filterByType('field')">Field</button>
  <button class="filter-btn" data-filter="engine" onclick="filterByType('engine')">Engine</button>
</div>

<div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.8rem;">
  <span style="color: var(--color-text-muted); padding: 0.25rem 0;">Sort:</span>
  <button class="filter-btn sort-btn active" data-sort="default" onclick="sortCards('default')" style="padding: 0.25rem 0.625rem;">Default</button>
  <button class="filter-btn sort-btn" data-sort="constructs" onclick="sortCards('constructs')" style="padding: 0.25rem 0.625rem;">Most Constructs</button>
  <button class="filter-btn sort-btn" data-sort="alpha" onclick="sortCards('alpha')" style="padding: 0.25rem 0.625rem;">A–Z</button>
</div>

<div class="pack-grid" id="pack-grid">
  {{ range .Pages }}
    {{ partial "pack-card.html" . }}
  {{ end }}
</div>

<div class="no-results" id="no-results" style="display: none;">
  <p>No PAX match your search.</p>
</div>
{{ end }}

{{ define "scripts" }}
<script>
(function() {
  const searchInput = document.getElementById('search-input');
  const packGrid = document.getElementById('pack-grid');
  const noResults = document.getElementById('no-results');
  const cards = Array.from(packGrid.querySelectorAll('.pack-card'));
  const filterBtns = document.querySelectorAll('.filter-btn:not(.sort-btn)');
  const sortBtns = document.querySelectorAll('.sort-btn');
  let activeType = 'all';

  function filterCards() {
    const query = searchInput.value.toLowerCase().trim();
    let visibleCount = 0;

    cards.forEach(card => {
      const name = (card.dataset.name || '').toLowerCase();
      const desc = (card.dataset.description || '').toLowerCase();
      const tags = (card.dataset.tags || '').toLowerCase();
      const domain = (card.dataset.domain || '').toLowerCase();
      const type = card.dataset.paxType;

      const matchesSearch = !query ||
        name.includes(query) ||
        desc.includes(query) ||
        tags.includes(query) ||
        domain.includes(query);

      const matchesType = activeType === 'all' || type === activeType;

      if (matchesSearch && matchesType) {
        card.style.display = '';
        visibleCount++;
      } else {
        card.style.display = 'none';
      }
    });

    noResults.style.display = visibleCount === 0 ? '' : 'none';
  }

  window.filterByType = function(type) {
    activeType = type;
    filterBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === type);
    });
    filterCards();
  };

  window.sortCards = function(mode) {
    sortBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.sort === mode));
    const sorted = [...cards];
    if (mode === 'constructs') {
      sorted.sort((a, b) => (parseInt(b.dataset.constructs) || 0) - (parseInt(a.dataset.constructs) || 0));
    } else if (mode === 'alpha') {
      sorted.sort((a, b) => (a.dataset.name || '').localeCompare(b.dataset.name || ''));
    }
    sorted.forEach(card => packGrid.appendChild(card));
  };

  searchInput.addEventListener('input', filterCards);
  filterByType('all');
})();
</script>
{{ end }}
