<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.tagline }}{{ end }}">
  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.tagline }}{{ end }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.tagline }}{{ end }}{{ end }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <style>
    :root {
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-surface-hover: #334155;
      --color-border: #334155;
      --color-text: #e2e8f0;
      --color-text-muted: #94a3b8;
      --color-accent: #38bdf8;
      --color-accent-hover: #7dd3fc;
      --color-paper: #a78bfa;
      --color-topic: #34d399;
      --color-field: #fb923c;
      --color-engine: #f472b6;
      --color-enterprise: #facc15;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { color: var(--color-accent-hover); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--color-border);
      padding: 1rem 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }
    .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      font-family: var(--font-mono);
    }
    .site-title span { color: var(--color-accent); }
    nav { display: flex; gap: 0.75rem 1.25rem; flex-wrap: wrap; align-items: center; margin-left: auto; }
    nav a {
      color: var(--color-text-muted);
      font-size: 0.875rem;
      font-weight: 500;
    }
    nav a:hover { color: var(--color-text); }

    /* Footer */
    footer {
      border-top: 1px solid var(--color-border);
      padding: 2rem 0;
      margin-top: 4rem;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }

    /* Type badges */
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-paper { background: rgba(167, 139, 250, 0.2); color: var(--color-paper); }
    .badge-topic { background: rgba(52, 211, 153, 0.2); color: var(--color-topic); }
    .badge-field { background: rgba(251, 146, 60, 0.2); color: var(--color-field); }
    .badge-engine { background: rgba(244, 114, 182, 0.2); color: var(--color-engine); }
    .badge-enterprise { background: rgba(250, 204, 21, 0.2); color: var(--color-enterprise); }

    /* Tag pills */
    .tag {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      background: var(--color-surface);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }

    /* Cards */
    .pack-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      transition: border-color 0.15s, transform 0.15s;
    }
    .pack-card:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
    }
    .pack-card h3 {
      font-size: 1.125rem;
      margin-bottom: 0.5rem;
    }
    .pack-card h3 a { color: var(--color-text); }
    .pack-card h3 a:hover { color: var(--color-accent); }
    .pack-card .description {
      color: var(--color-text-muted);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pack-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .pack-card .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .pack-card .stats span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Grid */
    .pack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    /* Hero */
    .hero {
      padding: 4rem 0 3rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .hero h1 span { color: var(--color-accent); }
    .hero p {
      color: var(--color-text-muted);
      font-size: 1.125rem;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Search/Filter bar */
    .search-bar {
      margin: 2rem 0;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.625rem 1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      color: var(--color-text);
      font-size: 0.875rem;
      outline: none;
    }
    .search-input:focus { border-color: var(--color-accent); }
    .search-input::placeholder { color: var(--color-text-muted); }

    .filter-btn {
      padding: 0.5rem 1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--color-accent); color: var(--color-text); }
    .filter-btn.active {
      background: rgba(56, 189, 248, 0.15);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* Pack detail */
    .pack-detail { padding: 3rem 0; }
    .pack-detail h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .pack-detail .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }
    .pack-detail .section {
      margin-top: 2rem;
    }
    .pack-detail .section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .construct-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .construct-chip {
      padding: 0.25rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-family: var(--font-mono);
      background: rgba(56, 189, 248, 0.1);
      color: var(--color-accent);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--color-accent);
      color: var(--color-bg);
      font-weight: 600;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .download-btn:hover {
      background: var(--color-accent-hover);
      color: var(--color-bg);
    }

    .content-body {
      color: var(--color-text-muted);
      line-height: 1.8;
    }
    .content-body p { margin-bottom: 1rem; }
    .content-body h2 { color: var(--color-text); margin: 2rem 0 0.75rem; font-size: 1.25rem; }
    .content-body h3 { color: var(--color-text); margin: 1.5rem 0 0.5rem; font-size: 1.1rem; }
    .content-body ul, .content-body ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .content-body li { margin-bottom: 0.375rem; }
    .content-body li em { color: var(--color-text-muted); font-size: 0.9em; }
    .content-body strong { color: var(--color-text); }
    .content-body code {
      font-family: var(--font-mono);
      background: var(--color-surface);
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }
    .content-body pre {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .content-body pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .content-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .content-body th {
      text-align: left;
      padding: 0.625rem 0.75rem;
      background: var(--color-surface);
      color: var(--color-text);
      font-weight: 600;
      border-bottom: 2px solid var(--color-border);
    }
    .content-body td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--color-border);
    }
    .content-body blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: 1rem;
      margin: 1rem 0;
      color: var(--color-text-muted);
      font-style: italic;
    }
    .content-body a { color: var(--color-accent); }
    .content-body a:hover { color: var(--color-accent-hover); }
    .content-body .download-btn { color: var(--color-bg); }
    .content-body .download-btn:hover { color: var(--color-bg); }

    /* Mobile nav toggle */
    .nav-toggle { display: none; background: none; border: none; color: var(--color-text); font-size: 1.25rem; cursor: pointer; padding: 0.25rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 1.75rem; }
      .hero p { font-size: 0.95rem; }
      .pack-grid { grid-template-columns: 1fr; }
      .nav-toggle { display: block; }
      nav { display: none; flex-direction: column; width: 100%; gap: 0.5rem; padding-top: 0.75rem; border-top: 1px solid var(--color-border); }
      nav.open { display: flex; }
      .header-inner { flex-wrap: wrap; }
      .pack-detail .meta-row { flex-direction: column; gap: 0.5rem; }
      .content-body table { font-size: 0.75rem; }
      .content-body th, .content-body td { padding: 0.375rem 0.5rem; }
      .search-bar { flex-direction: column; }
      .search-input { min-width: unset; }
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="/" class="site-title">pax<span>/</span>market</a>
      <button class="nav-toggle" onclick="document.querySelector('nav').classList.toggle('open')" aria-label="Menu">&#9776;</button>
      <nav>
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <div style="display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.75rem; flex-wrap: wrap;">
        <a href="/graph/" style="color: var(--color-text-muted); font-size: 0.8rem;">Knowledge Graph</a>
        <a href="/constructs/" style="color: var(--color-text-muted); font-size: 0.8rem;">Constructs</a>
        <a href="/api/" style="color: var(--color-text-muted); font-size: 0.8rem;">API</a>
        <a href="https://github.com/JELambert/pax-market" target="_blank" rel="noopener" style="color: var(--color-text-muted); font-size: 0.8rem;">GitHub</a>
        <a href="https://github.com/JELambert/praxis" target="_blank" rel="noopener" style="color: var(--color-text-muted); font-size: 0.8rem;">Praxis</a>
      </div>
      <p>PAX Marketplace — Portable Analytical eXpertise</p>
    </div>
  </footer>

  {{ block "scripts" . }}{{ end }}
</body>
</html>
